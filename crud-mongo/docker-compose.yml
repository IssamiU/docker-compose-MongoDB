services:
  mongodb:
    image: mongo:7.0
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123

  mongo-express:
    image: mongo-express:1.0
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password123
      ME_CONFIG_MONGODB_URL: mongodb://admin:password123@localhost:27017/?authSource=admin

  crud-api:
    image: node:20-alpine
    ports:
      - 3000:3000
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "npm i && node server.js"
    environment:
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/cruddb?authSource=admin
    depends_on:
      - mongodb

volumes:
  mongodb_data:
